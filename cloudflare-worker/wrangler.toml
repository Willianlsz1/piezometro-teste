name = "piezometro-worker"
main = "src/index.js"
compatibility_date = "2026-01-15"

# ── CRON ──────────────────────────────────────────────────────────────────────
# Roda o motor de alertas (scheduled()) a cada 1 minuto — equivalente ao
# setInterval(checkAlerts, ALERT_POLL_SEC * 1000) do server.js original.
[triggers]
crons = ["* * * * *"]

# ── KV NAMESPACE (estado do motor de alertas) ────────────────────────────────
# Substitui as variáveis em memória do server.js (lastNotifiedLevel,
# lastCriticalNotify, alertLog), que não sobrevivem entre invocações no
# Workers. Crie o namespace com:
#
#   wrangler kv namespace create ALERT_STATE
#
# e cole o "id" retornado no lugar de "COLOQUE_O_ID_AQUI" abaixo.
[[kv_namespaces]]
binding = "ALERT_STATE"
id = "c8b05f6bf47f48fd80754250c26c54db"

# ── D1 DATABASE (leituras dos piezômetros) ───────────────────────────────────
# Substitui o InfluxDB: todas as leituras ficam numa tabela SQLite gerenciada
# pela Cloudflare. Crie o banco com:
#
#   wrangler d1 create piezometro-db
#
# e cole o "database_id" retornado no lugar de "COLOQUE_O_ID_AQUI" abaixo.
# Depois aplique o schema (ver schema.sql) com:
#
#   wrangler d1 execute piezometro-db --remote --file=schema.sql
#
[[d1_databases]]
binding = "DB"
database_name = "piezometro-db"
database_id = "df474eab-c128-42c0-bbf3-9b5a9afa0e87"

# ── VARIÁVEIS NÃO SENSÍVEIS ───────────────────────────────────────────────────
# Mesmos nomes e defaults do server.js (ver readme.md, seção "Variáveis de
# Ambiente"). Os segredos (tokens/chaves) NÃO ficam aqui — vão via
# `wrangler secret put`, listados no comentário abaixo.
[vars]
ALLOWED_ORIGIN     = "*"
NIVEL_ATENCAO      = "12"
NIVEL_CRITICO      = "15"
ALERT_REPEAT_MIN   = "15"
TWILIO_FROM        = ""
TWILIO_TO          = ""

# Silêncio de instrumento além deste tempo (segundos) = alarme de COMUNICAÇÃO,
# camada separada do alarme de nível (ver docs/projeto/DASHBOARD_PROFISSIONAL.md §2/§6,
# P2). Default 900s = 15 min.
SILENCE_ALERT_SEC  = "900"

# Janela (minutos) usada para calcular a taxa de variação do nível d'água
# (m/dia) — compara a leitura atual com a leitura mais próxima de
# "agora - TAXA_JANELA_MIN". Default 60 min.
TAXA_JANELA_MIN    = "60"

# Taxa de variação (m/dia) acima da qual dispara alerta de "variação rápida",
# mesmo com o nível dentro da faixa normal. Referência profissional (ASDSO):
# 0,1 m/dia. Default aqui é maior por se tratar de protótipo didático, para
# não gerar alarme excessivo com o ruído do sensor stand-in.
TAXA_MAX_M_DIA     = "0.5"

# Janela (segundos) que o DASHBOARD usa para marcar um piezômetro como "sem
# sinal" na UI — servida via GET /config para não duplicar esse número no
# index.html (mesmo espírito de NIVEL_ATENCAO/NIVEL_CRITICO).
STALE_SEG          = "60"

# Histerese (deadband) da classificação de nível, em metros: evita alarme
# "chattering" quando o nível oscila bem em cima do limiar de ATENÇÃO ou
# CRÍTICO (ISA-18.2). Só se aplica na DESCIDA de faixa — a subida continua
# usando o limiar puro, sem atraso. Ver docs/projeto/DASHBOARD_PROFISSIONAL.md §5.
HISTERESE_M        = "0.2"

# Catálogo de instrumentos exibido no dashboard (mapa/seletor de piezômetro):
# id, nome amigável e coordenadas de cada piezômetro cadastrado. Servido em
# GET /config para o dashboard carregar no boot em vez de hard-codar a lista.
PIEZOMETROS = '[{"id":"PZ-01","nome":"Dique Norte","lat":-20.1975,"lng":-43.4653},{"id":"PZ-02","nome":"Galeria Sul","lat":-20.2043,"lng":-43.4590},{"id":"PZ-03","nome":"Talude Leste","lat":-20.2001,"lng":-43.4521}]'

# ── SEGREDOS (definir com `wrangler secret put <NOME>`) ──────────────────────
# DEVICE_KEY           → chave compartilhada da placa ESP32 (header x-device-key)
# TELEGRAM_BOT_TOKEN   → token do bot do Telegram (@BotFather)
# TELEGRAM_CHAT_ID     → chat/grupo que recebe os alertas
# TWILIO_ACCOUNT_SID   → SID da conta Twilio (SMS, opcional)
# TWILIO_AUTH_TOKEN    → token de autenticação Twilio (SMS, opcional)
